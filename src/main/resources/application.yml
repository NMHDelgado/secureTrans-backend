spring:
  application:
    name: securetrans-backend
  datasource:
    url: ${DB_URL}  # :jdbc:postgresql://localhost:5432/securetrans
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:delgado}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

server:
  port: 8080

securetrans:
  cors:
    # Liste separee par des virgules. En prod, remplacer par le(s) domaine(s) reel(s) du frontend.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173, https:securetrans.vercel.app}
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production-min-32-chars}
    expiration-ms: 3600000
  admin:
    # Compte administrateur provisionne automatiquement au demarrage (SeederController).
    # En production, TOUJOURS surcharger ADMIN_EMAIL / ADMIN_PASSWORD par variables d'environnement.
    email: ${ADMIN_EMAIL:admin@securetrans.com}
    password: ${ADMIN_PASSWORD:ChangeMe123!}
    full-name: ${ADMIN_FULL_NAME:Administrateur SecureTrans}
  fraud-engine:
    base-url: ${FRAUD_ENGINE_URL:http://localhost:8500}
    predict-path: /predict
    timeout-ms: 1500
    block-threshold: 0.80      # risque >= 80% => transaction bloquee automatiquement
    review-threshold: 0.40     # risque >= 40% => alerte admin mais transaction non bloquee

resilience4j:
  circuitbreaker:
    instances:
      fraudEngine:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
  retry:
    instances:
      fraudEngine:
        max-attempts: 2
        wait-duration: 200ms
  timelimiter:
    instances:
      fraudEngine:
        timeout-duration: 1500ms
